<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth Forgot Password — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth-forgot.css?v=20260506-board-contract" />
</head>
<body>
  <main class="forgot-stage" aria-label="Forgot password" data-figma-id="375:1160">
    <div class="forgot-frame">
      <img class="forgot-frame-bg" src="img/auth-forgot-1280-bg-root-figma.png" alt="" aria-hidden="true" />
      <div class="forgot-menu" aria-label="Top navigation">
        <button class="forgot-burger" type="button" tabindex="-1" aria-hidden="true"></button>
        <a class="forgot-brand" href="home.html" aria-label="Home">
          <img src="img/login-brand-figma.png" alt="NEURO" />
        </a>
        <div class="forgot-menu-right">
          <span class="forgot-lang">Eng</span>
          <a class="forgot-signup" href="signup-step-1.html">Sign up</a>
          <button class="forgot-toggle" type="button" tabindex="-1" aria-hidden="true">
            <img src="img/login-toggle-icon.svg" alt="" />
          </button>
        </div>
        <button class="forgot-mobile-toggle" type="button" tabindex="-1" aria-hidden="true">
          <img src="img/login-toggle-icon.svg" alt="" />
        </button>
      </div>

      <div class="forgot-hero" aria-hidden="true">
        <img src="img/auth-forgot-1280-bg-silhouette-figma.png" alt="" />
      </div>

      <section class="forgot-card-wrap" aria-label="Password reset form">
        <div class="forgot-card">
          <img class="forgot-card-bg" src="img/auth-forgot-1280-panel-group-figma.png" alt="" aria-hidden="true" />
          <form class="forgot-panel" action="login.html" method="get">
            <h1 class="forgot-title">Forgot your password?</h1>
            <p class="forgot-subtitle">
              Please enter email address you specified during registration. If you have any issues, please contact us via
              <a href="https://24hours.support-nebula.com/hc/en-us" target="_blank" rel="noopener">Support center</a>
            </p>

            <input class="forgot-field" type="email" placeholder="Your email" aria-label="Your email" />

            <button class="forgot-button" type="submit">Continue</button>
            <a class="forgot-cancel" href="login.html">Cancel</a>
          </form>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
