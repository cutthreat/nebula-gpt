<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create an account — Step 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="figma-auth.css?v=20260505-step2-source-assets" />
</head>
<body class="na-auth-page na-auth-page--create na-auth-page--step2">
  <main class="na-auth-stage" aria-label="Create account step 2" data-figma-id="368:1257">
    <div class="na-auth-bg-layer na-auth-bg-layer--root" data-figma-id="368:1258" data-figma-image-ref="fd5c43707cda07281ef1a450b0950062854e60cb"></div>
    <div class="na-auth-bg-layer na-auth-bg-layer--silhouette" data-figma-id="368:1259" data-figma-image-ref="9fd63162d3194671f0a28062c463a5de32f38154"></div>
    <div class="na-auth-page__shell">
      <button class="na-auth-burger" type="button" tabindex="-1" aria-hidden="true"></button>
      <a class="na-auth-page__brand" href="home.html" aria-label="Home" data-figma-id="579:6521"><img src="img/logo-white.png" alt="NEURO" data-figma-image-ref="4ecae954384fd00b714cbf1b5fdca2c339f35a16"></a>
      <div class="na-auth-page__links">
        <span class="na-auth-page__lang"><span class="na-auth-page__lang-text">Eng</span><span class="na-auth-page__fallback">▾</span><img class="na-auth-page__chevron" src="img/auth-signup-step2-320-lang-chevron-figma.png" alt="" aria-hidden="true"></span>
        <a href="login.html"><span class="na-auth-page__login-text">Log in</span><span class="na-auth-page__fallback">→</span><img class="na-auth-page__login-arrow" src="img/auth-signup-step1-320-login-arrow-figma.png" alt="" aria-hidden="true"></a>
      </div>
      <button class="na-auth-mobile-toggle" type="button" tabindex="-1" aria-hidden="true">
        <img src="img/login-toggle-icon.svg" alt="" />
      </button>

      <aside class="na-auth-page__side"></aside>
      <section class="na-auth-page__panel" data-figma-id="368:1267" data-figma-image-ref="fd5c43707cda07281ef1a450b0950062854e60cb">
        <form class="na-auth-form" action="login.html" method="get">
          <h1 class="na-auth-form__title">Create an account</h1>
          <p class="na-auth-form__subtitle">Lets us know a little about yourself</p>

          <div class="na-auth-step2-stack">
            <div class="na-auth-field-wrap na-auth-field-wrap--arrow">
              <input class="na-auth-field" type="email" placeholder="example@mail.com">
            </div>
            <div class="na-auth-field-wrap na-auth-field-wrap--arrow">
              <input class="na-auth-field" type="password" placeholder="Enter your password">
            </div>
            <div class="na-auth-field-wrap na-auth-field-wrap--arrow">
              <input class="na-auth-field" type="password" placeholder="Re-enter password">
            </div>
          </div>

          <div class="na-auth-checks" aria-label="Signup agreements">
            <label class="na-auth-check">
              <input type="checkbox" checked>
              <span>By logging in, you agree to our <a href="https://asknebula.com/app/terms" target="_blank" rel="noopener">Terms of service</a><br>and <a href="https://asknebula.com/app/privacy" target="_blank" rel="noopener">Privacy Policy</a></span>
            </label>
            <label class="na-auth-check">
              <input type="checkbox">
              <span>Subscribe for special offers and product updates</span>
            </label>
          </div>
          <button class="na-auth-btn" type="submit">Get started</button>
          <a class="na-auth-btn na-auth-btn--ghost" href="signup-step-1.html">← Previous step</a>
        </form>
      </section>
      <aside class="na-auth-page__side na-auth-page__side--right"></aside>
    </div>
  </main>
